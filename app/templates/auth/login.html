{% extends "base.html" %}

{% block title %}Вход | МИФУД{% endblock %}

{% block content %}
  <section class="mifud-auth-block py-4">
    <div class="text-center mb-4">
      <div class="mifud-auth-logo mx-auto mb-3">
        <svg
          class="mifud-logo-svg"
          viewBox="0 0 100 100"
          role="img"
          aria-label="Логотип МИФУД"
        >
          <circle cx="50" cy="50" r="46" fill="none" stroke="var(--mifud-blue)" stroke-width="2.5" />
          <!-- узлы -->
          <circle cx="50" cy="10" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="18" cy="35" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="82" cy="35" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="12" cy="55" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="88" cy="55" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="18" cy="70" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="82" cy="70" r="3.8" fill="var(--mifud-blue)" />
          <circle cx="50" cy="90" r="3.8" fill="var(--mifud-blue)" />

          <!-- линии (схема “атома”) -->
          <path d="M50 10 L18 35 L50 55 L18 70 Z" fill="none" stroke="var(--mifud-blue)" stroke-width="2" stroke-linejoin="round" />
          <path d="M50 10 L82 35 L82 70 L50 55 Z" fill="none" stroke="var(--mifud-blue)" stroke-width="2" stroke-linejoin="round" />
          <path d="M18 35 L12 55 L50 55 L18 70 Z" fill="none" stroke="var(--mifud-blue)" stroke-width="2" stroke-linejoin="round" />
          <path d="M82 35 L88 55 L50 55 L82 70 Z" fill="none" stroke="var(--mifud-blue)" stroke-width="2" stroke-linejoin="round" />

          <line x1="18" y1="35" x2="82" y2="35" stroke="var(--mifud-blue)" stroke-width="2" />
          <line x1="12" y1="55" x2="88" y2="55" stroke="var(--mifud-blue)" stroke-width="2" />
          <line x1="18" y1="70" x2="82" y2="70" stroke="var(--mifud-blue)" stroke-width="2" />
        </svg>
      </div>
      <div class="mifud-title fs-1 lh-1 mb-2">МИФУД</div>
      <div class="fw-semibold">Система предзаказа еды · НИЯУ МИФИ</div>
    </div>

    <div class="mx-auto" style="max-width: 360px;">
      <h1 class="h4 mifud-title mb-4">Войти в аккаунт</h1>

      <form method="post" action="/auth/login" class="d-grid gap-3">
        <div>
          <label class="visually-hidden" for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control form-control-lg mifud-input"
            placeholder="EMAIL"
            autocomplete="email"
            required
          />
        </div>

        <div>
          <label class="visually-hidden" for="password">Пароль</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control form-control-lg mifud-input"
            placeholder="ПАРОЛЬ"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn mifud-btn-primary btn-lg w-100 mt-2">ВОЙТИ</button>
      </form>

      <div class="mifud-auth-actions mt-3">
        <span class="fw-semibold">Нет аккаунта?</span>
        <a class="fw-bold text-decoration-none text-primary" href="/auth/register">
          ЗАРЕГИСТРИРОВАТЬСЯ →
        </a>
      </div>
    </div>
  </section>
{% endblock %}
